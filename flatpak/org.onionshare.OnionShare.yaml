---
app-id: org.onionshare.OnionShare
command: onionshare
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
  - org.freedesktop.Sdk.Extension.llvm22
separate-locales: false
finish-args:
  - "--device=dri"
  - "--share=ipc"
  - "--share=network"
  - "--socket=wayland"
  - "--socket=fallback-x11"
  - "--talk-name=org.freedesktop.Notifications"
  - "--talk-name=org.freedesktop.secrets"
  - "--filesystem=~/OnionShare:create"
cleanup:
  - "/go"
  - "/bin/scripts"
modules:
  - name: pyside6
    buildsystem: simple
    build-commands: []
    modules:
      - name: pyside6-essentials
        only-arches:
          - x86_64
        buildsystem: simple
        build-commands:
          - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
            --prefix=${FLATPAK_DEST} "pyside6-essentials" --no-build-isolation
        sources:
          - type: file
            url: https://files.pythonhosted.org/packages/5c/49/0e1237c4400bec7e335d2c4eeb49bc40d9fd88a9ac44ca9083ce1abdc308/pyside6_essentials-6.11.1-cp310-abi3-manylinux_2_34_x86_64.whl
            sha256: e3ef7027b41e4e55fadb56e3b3257dc8ee92154b639fe67fc4c8e05e9d976c60
        modules:
          - name: shiboken6
            buildsystem: simple
            build-commands:
              - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
                --prefix=${FLATPAK_DEST} "shiboken6" --no-build-isolation
            sources:
              - type: file
                url: https://files.pythonhosted.org/packages/c7/9b/e0355d8897b5c150770f1d95718aad17d432fcc9c035c04f3f58427d4693/shiboken6-6.11.1-cp310-abi3-manylinux_2_34_x86_64.whl
                sha256: 9a8bccfafc8805254cabcfa1edfaf55cd52889f4998c91ad0d9a4433fb1bcdbe
      - name: pyside6-essentials-aarch64
        only-arches:
          - aarch64
        buildsystem: simple
        build-commands:
          - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
            --prefix=${FLATPAK_DEST} "pyside6-essentials" --no-build-isolation
        sources:
          - type: file
            url: https://files.pythonhosted.org/packages/4c/c5/da4c5f23c6540ac5211a1f60177c8dee84b1bf40f2719479587ab8c60731/pyside6_essentials-6.11.1-cp310-abi3-manylinux_2_39_aarch64.whl
            sha256: a039b6da68a3a4b9d243217b2b98d475eed3f617159ef6be925badab53c11b0d
        modules:
          - name: shiboken6
            buildsystem: simple
            build-commands:
              - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
                --prefix=${FLATPAK_DEST} "shiboken6" --no-build-isolation
            sources:
              - type: file
                url: https://files.pythonhosted.org/packages/57/d5/dd4f1defed400be03340f2ede34b61f846776650b4e7ed9ebaf4c71979a2/shiboken6-6.11.1-cp310-abi3-manylinux_2_39_aarch64.whl
                sha256: 1bd2f4314414df2d122d9f646e03b731bc6d6b5f77a5f53f99a4fe4e97d84e6f
  - name: snowflake-client
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/golang/bin
      env:
        GOBIN: "/app/bin/"
        GO11MODULE: on
        GOROOT: /usr/lib/sdk/golang
    build-commands:
      - ". /usr/lib/sdk/golang/enable.sh && go build -mod=vendor -o /app/bin/snowflake-client ./client"
    sources:
      - type: git
        url: https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/snowflake.git
        tag: v2.10.1
      - snowflake/go.mod.yml
  - name: obfs4proxy
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/golang/bin
      env:
        GOBIN: "/app/bin/"
        GO11MODULE: on
        GOROOT: /usr/lib/sdk/golang
    build-commands:
      - ". /usr/lib/sdk/golang/enable.sh && go build -mod=vendor -o /app/bin/obfs4proxy ./obfs4proxy"
    sources:
      - type: git
        url: https://gitlab.com/yawning/obfs4.git
        tag: obfs4proxy-0.0.14
      - obfs4proxy/go.mod.yml
  - name: meek-client
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/golang/bin
      env:
        GOBIN: "/app/bin/"
        GO11MODULE: on
        GOROOT: /usr/lib/sdk/golang
    build-commands:
      - ". /usr/lib/sdk/golang/enable.sh && go build -mod=vendor -o /app/bin/meek-client ./meek-client"
    sources:
      - type: git
        url: https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/meek.git
        tag: v0.38.0
      - meek-client/go.mod.yml
  - name: tor
    buildsystem: autotools
    sources:
      - type: archive
        sha256: bd75ba7fd68f607c7806fcf70156a300aa926e9ad69a5e56a8e6414f5227e833
        url: https://dist.torproject.org/tor-0.4.9.9.tar.gz
    modules:
      - name: libevent
        buildsystem: autotools
        sources:
          - type: archive
            url: https://github.com/libevent/libevent/releases/download/release-2.1.12-stable/libevent-2.1.12-stable.tar.gz
            sha256: 92e6de1be9ec176428fd2367677e61ceffc2ee1cb119035037a27d346b0403bb
  - name: onionshare
    buildsystem: simple
    ensure-writable:
      - easy-install.pth
    build-commands:
      - rm desktop/pyproject.toml
      - export PIP_NO_INDEX=1 PIP_FIND_LINKS="file://${PWD}" && cd desktop && pip3 install --prefix=${FLATPAK_DEST} --no-deps --use-pep517 --no-index --find-links="${PIP_FIND_LINKS}" .
      - cd desktop && install -D -m0644 org.onionshare.OnionShare.appdata.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.appdata.xml
      - cd desktop && install -D -m0644 org.onionshare.OnionShare.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/org.onionshare.OnionShare.svg
      - cd desktop && install -D -m0644 org.onionshare.OnionShare.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
    sources:
      - type: dir
        path: ..
      - type: file
        url: https://files.pythonhosted.org/packages/94/b8/f1f62a5e3c0ad2ff1d189590bfa4c46b4f3b6e49cef6f26c6ee4e575394d/setuptools-80.10.2-py3-none-any.whl
        sha256: 95b30ddfb717250edb492926c92b5221f7ef3fbcc2b07579bcd4a27da21d0173
      - type: file
        url: https://files.pythonhosted.org/packages/fa/7f/4c07234086edbce4a0a446209dc0cb08a19bb206a3ea53b2f56a403f983b/wheel-0.41.3-py3-none-any.whl
        sha256: 488609bc63a29322326e05560731bf7bfea8e48ad646e1f5e40d366607de0942
      # - type: git
      #   url: https://github.com/onionshare/onionshare.git
      #   tag: v2.6.3
    modules:
      - onionshare-desktop.yaml
      - name: onionshare-cli
        buildsystem: simple
        build-commands:
          - rm cli/pyproject.toml
          - export PIP_NO_INDEX=1 PIP_FIND_LINKS="file://${PWD}" && cd cli && pip3 install --prefix=${FLATPAK_DEST} --no-deps --use-pep517 --no-index --find-links="${PIP_FIND_LINKS}" .
        sources:
          - type: dir
            path: ..
          - type: file
            url: https://files.pythonhosted.org/packages/94/b8/f1f62a5e3c0ad2ff1d189590bfa4c46b4f3b6e49cef6f26c6ee4e575394d/setuptools-80.10.2-py3-none-any.whl
            sha256: 95b30ddfb717250edb492926c92b5221f7ef3fbcc2b07579bcd4a27da21d0173
          - type: file
            url: https://files.pythonhosted.org/packages/fa/7f/4c07234086edbce4a0a446209dc0cb08a19bb206a3ea53b2f56a403f983b/wheel-0.41.3-py3-none-any.whl
            sha256: 488609bc63a29322326e05560731bf7bfea8e48ad646e1f5e40d366607de0942
        #   - type: git
        #     url: https://github.com/onionshare/onionshare.git
        #     tag: v2.6.3
        modules:
          - onionshare-cli.yaml
